# services.yaml
# ==============
# Which processes the supervisor launches. Each top-level key becomes one
# supervised child process; keys match the service name used for runtime
# state files and logs.
#
# Keys per entry:
#   cmd:  argv list. First token may be `python` / `python3` (gets swapped
#         for the active interpreter) or a path to a compiled binary.
#   env:  extra environment variables set on the child. ARTHA_* plus
#         IPC_PUBLISHES / IPC_SUBSCRIBES are injected by the supervisor.
#   ipc:  optional. Declares SHM topic names and their type_names (classes
#         in core/types.py). Drives IPC_PUBLISHES / IPC_SUBSCRIBES env vars.
#   type_check: optional bool. If true, supervisor runs `<cmd> --type-check`
#         at boot and verifies Rust struct layouts match core/types.py.
#
# See docs/concepts/supervisor.md for the lifecycle model, and
# docs/concepts/ipc.md for the three-tier memory-movement split.

param_server:
  cmd: ["python3", "services/param_server.py"]
  env:
    SERVICE_NAME: param_server
    PARAM_FILE_PATH: "config/params.json"

bridge:
  cmd: ["python3", "services/bridge.py"]
  env:
    SERVICE_NAME: bridge


